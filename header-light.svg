<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" role="img" aria-labelledby="hdrTitle hdrDesc">
  <title id="hdrTitle">FumiakiC</title>
  <desc id="hdrDesc">Mechanical design engineer crossing into full-stack development and offensive security. A booting terminal beside an engineering drawing title block.</desc>
  <style>
    /* ============ palette (single source of truth) ============ */
    svg{
      --bg:#f6f8f5; --panel:#ffffff; --panel-line:#dbe6e0;
      --grid:#e3ebe6; --phos:#007a4d; --ink:#25332d;
      --dim:#77897f;  --blue:#1f6fd1; --amber:#b06e12;
      --scan-opacity:0.05; --glow:0.4;
    }
    /* ============ base ============ */
    .mono{font-family:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace}
    .phos{fill:var(--phos)} .ink{fill:var(--ink)} .blue{fill:var(--blue)}
    .amber{fill:var(--amber)} .dim{fill:var(--dim)}
    /* ============ motion ============ */
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes fadein{to{opacity:1}}
    @keyframes typing{to{clip-path:inset(0 -2% 0 0)}}
    @keyframes sweep{from{transform:translateY(0)}to{transform:translateY(340px)}}
    .cursor{animation:blink 1.05s step-end infinite}
    .pulse{animation:pulse 1.4s ease-in-out infinite}
    .reveal{opacity:0;animation:fadein .3s ease-out forwards}
    .d1{animation-delay:.15s}.d2{animation-delay:2.3s}.d3{animation-delay:2.55s}
    .d4{animation-delay:2.8s}.d5{animation-delay:3.05s}.d6{animation-delay:3.3s}
    .typed{clip-path:inset(0 100% 0 0);animation:typing 1.4s steps(21,end) .7s forwards}
    .scan{animation:sweep 7s linear 1s infinite}
    /* ============ a11y: freeze at final state ============ */
    @media (prefers-reduced-motion:reduce){
      *{animation:none !important}
      .reveal{opacity:1}.typed{clip-path:none}.scan{opacity:0}
    }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="var(--grid)" stroke-width="1"/>
    </pattern>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--phos)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--phos)" stop-opacity="var(--scan-opacity)"/>
      <stop offset="1" stop-color="var(--phos)" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ============ backdrop ============ -->
  <rect width="860" height="300" fill="var(--bg)"/>
  <rect class="reveal" width="860" height="300" fill="url(#grid)"/>
  <g class="scan"><rect x="0" y="-40" width="860" height="40" fill="url(#scanGrad)"/></g>

  <!-- ============ drafting furniture: crop marks + dimension line ============ -->
  <g stroke="var(--blue)" stroke-width="1.5" opacity="0.55" fill="none">
    <path d="M12 12h16 M12 12v16 M848 12h-16 M848 12v16 M12 288h16 M12 288v-16 M848 288h-16 M848 288v-16"/>
  </g>
  <g class="mono" opacity="0.7" font-size="10">
    <line x1="40" y1="24" x2="820" y2="24" stroke="var(--blue)" stroke-width="1" opacity="0.5"/>
    <path d="M40 20v8 M44 24h-6 M820 20v8 M816 24h6" stroke="var(--blue)" stroke-width="1"/>
    <rect x="392" y="17" width="96" height="14" fill="var(--bg)"/>
    <text x="440" y="27" text-anchor="middle" class="blue">860.00 ±0.01</text>
  </g>

  <!-- ============ left: booting terminal ============ -->
  <text x="34" y="72" class="mono phos" font-size="42" font-weight="700" filter="url(#glow)">&gt; FumiakiC</text>
  <rect class="cursor" x="292" y="46" width="16" height="30" fill="var(--phos)"/>
  <text x="36" y="98" class="mono dim" font-size="13.5" letter-spacing="0.5">mechanical design engineer  //  full-stack &#215; offensive security</text>

  <text x="36" y="135" class="mono" font-size="14">
    <tspan class="phos">fumiaki@github</tspan><tspan class="ink">:</tspan><tspan class="blue">~</tspan><tspan class="ink">$ </tspan>
  </text>
  <text x="179" y="135" class="mono ink typed" font-size="14">./whoami.sh --verbose</text>

  <g class="mono" font-size="14">
    <text class="reveal d2" x="36" y="165"><tspan class="phos">[ ok ]</tspan><tspan class="dim"> role &#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183; </tspan><tspan class="ink">Mechanical Design Engineer</tspan></text>
    <text class="reveal d3" x="36" y="189"><tspan class="phos">[ ok ]</tspan><tspan class="dim"> pivot &#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183; </tspan><tspan class="ink">Full-Stack / Manufacturing DX</tspan></text>
    <text class="reveal d4" x="36" y="213"><tspan class="phos">[ ok ]</tspan><tspan class="dim"> side_quest &#183;&#183;&#183;&#183;&#183; </tspan><tspan class="ink">Offensive Security </tspan><tspan class="dim">(legal*)</tspan></text>
    <text class="reveal d5" x="36" y="237"><tspan class="phos">[ ok ]</tspan><tspan class="dim"> streak &#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183;&#183; </tspan><tspan class="ink">TryHackMe, daily</tspan></text>
    <text class="reveal d6" x="36" y="261"><tspan class="amber">[fail]</tspan><tspan class="dim"> exit_vim &#183;&#183;&#183;&#183;&#183;&#183;&#183; </tspan><tspan class="ink">command not found</tspan></text>
  </g>

  <!-- ============ right: engineering title block ============ -->
  <g class="mono reveal d1">
    <rect x="588" y="44" width="236" height="212" fill="var(--panel)" stroke="var(--phos)" stroke-width="1.2" opacity="0.95"/>
    <path d="M588 72h236 M588 104h236 M588 136h236 M588 168h236 M588 200h236 M700 200v56" stroke="var(--panel-line)" stroke-width="1" fill="none"/>

    <text x="706" y="62" text-anchor="middle" class="blue" font-size="9" letter-spacing="2">— DRAWING TITLE BLOCK —</text>

    <text x="598" y="92" class="dim" font-size="9">DWG&#160;NO</text>
    <text x="816" y="92" text-anchor="end" class="phos" font-size="13">FumiakiC-&#8734;</text>
    <text x="598" y="124" class="dim" font-size="9">TITLE</text>
    <text x="816" y="124" text-anchor="end" class="ink" font-size="12">PROFILE.README</text>
    <text x="598" y="156" class="dim" font-size="9">STACK</text>
    <text x="816" y="156" text-anchor="end" class="ink" font-size="11">TS &#183; Next &#183; PS &#183; k8s</text>
    <text x="598" y="188" class="dim" font-size="9">MATERIAL</text>
    <text x="816" y="188" text-anchor="end" class="ink" font-size="12">caffeine, mostly</text>

    <text x="598" y="222" class="dim" font-size="9">SCALE</text>
    <text x="688" y="222" text-anchor="end" class="ink" font-size="12">1 : 1</text>
    <text x="710" y="222" class="dim" font-size="9">REV</text>
    <text x="816" y="222" text-anchor="end" class="ink" font-size="12">B</text>

    <text x="598" y="244" class="dim" font-size="9">STATUS</text>
    <circle cx="702" cy="240" r="4" class="amber pulse"/>
    <text x="816" y="244" text-anchor="end" class="amber pulse" font-size="12">BUILDING&#8230;</text>
  </g>
</svg>
